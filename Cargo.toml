[package]
name = "codex"
version = "0.1.0"
edition = "2021"
rust-version = "1.80"
authors = ["Daniel Lima <daniel.lima@infleet.com.br>"]
description = "Terminal-first ebook library and ereader manager"
license = "MIT"
readme = "README.md"
repository = ""
keywords = ["ebook", "kindle", "cli", "library", "calibre"]
categories = ["command-line-utilities"]

[[bin]]
name = "cdx"
path = "src/main.rs"

[dependencies]
anyhow = "1"
clap = { version = "=4.5.20", features = ["derive"] }
crossterm = "=0.28.1"
ratatui = "=0.28.1"

[dev-dependencies]
assert_cmd = "=2.0.16"
predicates = "=3.1.2"
